name: "Channel Audit & Branding (one-shot)"

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = write optimized channel branding; false = read-only audit"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Channel audit / branding repair
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            python scripts/channel_audit.py --apply
          else
            python scripts/channel_audit.py
          fi
