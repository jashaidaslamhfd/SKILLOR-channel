name: "SKILLOR - YouTube Shorts Automation (FR)"

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional video topic (empty = next Body Glitch episode)"
        required: false
        type: string
  schedule:
    # 3 videos/day for a French audience, auto-published at Paris peaks
    # (08:00 / 13:00 / 19:00 Europe/Paris) via status.publishAt — the code
    # snaps each upload to the exact next Paris slot, so the cron only needs
    # to start generation a bit before the slot. ONE cron per slot, year-round
    # (the winter/summer twin-cron system was removed per owner request —
    # publishAt already makes it unnecessary).
    - cron: "30 4 * * *"    # generation ~06:30 Paris -> publish 08:00
    - cron: "0 10 * * *"    # generation ~12:00 Paris -> publish 13:00
    - cron: "30 15 * * *"   # generation ~17:30 Paris -> publish 19:00

permissions:
  contents: write

concurrency:
  group: skillor-video-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache TTS model downloads for CPU reliability
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: skillor-tts-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-v3
          restore-keys: |
            skillor-tts-models-${{ runner.os }}-

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # ffmpeg: video assembly · fonts-dejavu-core: PIL captions ·
          # espeak-ng: Kokoro French phonemizer. (imagemagick removed —
          # captions are drawn with PIL; nothing reads IMAGEMAGICK_BINARY.)
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core espeak-ng
          python -m pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do python -m pip install -r requirements.txt && break || { echo "pip install failed, retry $i"; sleep 15; }; done

      - name: Run offline quality regression tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_body_glitch_topics.py
          python -m compileall -q src scripts tests
          python -m unittest discover -s tests -v

      - name: Validate required secrets (fail fast, before burning compute)
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          echo "Checking required secrets..."
          missing=0
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY missing."
            missing=1
          fi
          # YouTube OAuth trio — without these a run used to fail in phase 5
          # AFTER up to 3h of generation. Fail in seconds instead.
          for var in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET REFRESH_TOKEN; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var missing — the video would fail at upload time."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] && echo "✓ All required secrets present"
          exit "$missing"

      - name: Generate and upload Short
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Stronger model = better French hooks/titles (higher CTR/retention).
          # NOTE: llama-3.1-70b-versatile was DECOMMISSIONED by Groq — using it
          # returned a model-not-found error on every script call (the likely
          # cause of recent generation failures). 3.3 is the drop-in upgrade;
          # delete this line to fall back to llama-3.1-8b-instant.
          GROQ_MODEL: "llama-3.3-70b-versatile"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # ---- FRENCH AUDIENCE (all genuinely wired into code) ----
          TREND_REGION: "FR"
          YOUTUBE_REGION_CODE: "FR"
          CONTENT_SERIES: "body_glitches_fr"
          TOPIC_STRATEGY: "body_glitch_series_fr"
          REQUIRE_DAILY_TREND: "false"
          CHANNEL_LANGUAGE: "fr-FR"
          CHANNEL_COUNTRY: "FR"
          TTS_ENGINE: "kokoro"
          KOKORO_LANG_CODE: "f"
          KOKORO_VOICE: "ff_siwis"
          REQUIRE_CLONED_VOICE: "false"
          # ---- Image providers (optional keys auto-skipped if missing) ----
          AI_HORDE_API_KEY: ${{ secrets.AI_HORDE_API_KEY }}
          AI_HORDE_MAX_WAIT: "300"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          DEEPAI_API_KEY: ${{ secrets.DEEPAI_API_KEY }}
          MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # ---- YouTube OAuth ----
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          YT_MADE_FOR_KIDS: "false"
          YT_DECLARE_SYNTHETIC_MEDIA: "true"
          YT_PLAYLIST_ENABLED: "true"
          # Upload private + publishAt → YouTube auto-publishes at the exact
          # Paris peak (08:00 / 13:00 / 19:00). Videos sit privately first,
          # so a broken video can be deleted before it ever goes live.
          YT_PRIVACY_STATUS: "public"
          YT_SCHEDULE_PUBLISH: "true"
          # ---- Anti-spam (also dedupes the DST twin crons) ----
          ENFORCE_POSTING_GAP: "true"
          # ---- Quality gates ----
          TARGET_MIN_SECONDS: "40"
          TARGET_MAX_SECONDS: "55"
          CHATTERBOX_TEMPO: "0.96"
          CHATTERBOX_EXAGGERATION: "0.35"
          CHATTERBOX_CFG_WEIGHT: "0.70"
          CHATTERBOX_TEMPERATURE: "0.60"
          MUSIC_VOLUME: "0.07"
          ENABLE_SCREENSHOT_FALLBACK: "false"
          MIN_HOOK_SCORE: "85"
          QUALITY_APPROVAL_THRESHOLD: "85"
          MAX_HOOK_SECONDS: "5.0"
          FALLBACK_ABORT_RATIO: "0.80"
          VIDEO_TOPIC: ${{ inputs.topic || '' }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt / 3 ==="
            if python src/main.py; then break
            else
              rc=$?; echo "::warning::Failed attempt $attempt code $rc"
              if [ $attempt -eq 3 ]; then exit $rc; fi; sleep $((attempt * 60))
            fi
          done

      - name: Persist durable channel state (with rebase retry)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/)" ]; then echo "No state changes."; exit 0; fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/video_history.json data/upload_state.json data/media_hash_history.json 2>/dev/null || git add -u data/*_history.json data/*_state.json
          git commit -m "chore: persist SKILLOR channel state [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then break
            else echo "Push failed retry $i"; sleep $((i*5)); if [ $i -eq 3 ]; then echo "::warning::State push failed; recovery copy is in the run artifact."; exit 0; fi; fi
          done

      - name: Upload video, thumbnail, state backup and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillor-run-${{ github.run_id }}
          path: |
            output/
            pipeline.log
            data/
          if-no-files-found: ignore
          retention-days: 14
