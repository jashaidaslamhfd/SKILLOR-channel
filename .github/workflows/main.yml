name: "SKILLOR - YouTube Shorts Automation"

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional video topic (empty = trending topic)"
        required: false
        type: string
  schedule:
    # 3 videos/day for a French audience, uploaded PUBLIC immediately.
    # Gate removed (per owner request) so scheduled runs always execute -
    # no more 9-11s skips from a time-window gate.
    # YT_SCHEDULE_PUBLISH=false => uploads go live as PUBLIC right away
    # (no private/scheduled wait that could leave a video stuck unpublished).
    # Crons are in UTC. With Europe/Paris on CEST (UTC+2, summer) the
    # 7-min-past-the-hour times land on the 08:00 / 13:00 / 19:00 Paris peaks:
    #   08:07 Paris = 06:07 UTC
    #   13:07 Paris = 11:07 UTC
    #   19:07 Paris = 17:07 UTC
    # NOTE (DST): when Paris switches to CET (UTC+1, ~late Oct to late Mar),
    # shift these to 07 / 12 / 18 UTC so they stay on the same Paris peaks.
  - cron: "7 6 * * *"
  - cron: "7 11 * * *"
  - cron: "7 17 * * *"

permissions:
  contents: write

concurrency:
  group: skillor-video-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache TTS model downloads for CPU reliability
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: skillor-tts-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-v2
          restore-keys: |
            skillor-tts-models-${{ runner.os }}-

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core imagemagick espeak-ng
          POLICY_FILE="$(find /etc/ImageMagick-6 -name policy.xml 2>/dev/null | head -n 1 || true)"
          if [ -n "$POLICY_FILE" ]; then
            sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' "$POLICY_FILE" || true
          fi
          python -m pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do python -m pip install -r requirements.txt && break || { echo "pip install failed, retry $i"; sleep 15; }; done

      - name: Run offline quality regression tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_body_glitch_topics.py
          python -m compileall -q src scripts tests
          python -m unittest discover -s tests -v

      - name: Validate required secrets
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GROQ_API_KEY:-}" ]; then echo "::error::GROQ_API_KEY missing."; exit 1; fi

      - name: Generate and upload Short
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Stronger model = better French hooks/titles (higher CTR/retention).
          # 70B class beats the 8B default for creative French writing.
          # If this model errors (e.g. not on your Groq plan), delete this
          # line to fall back to llama-3.1-8b-instant.
          GROQ_MODEL: "llama-3.1-70b-versatile"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TREND_REGION: "FR"
          YOUTUBE_REGION_CODE: "FR"
          AI_HORDE_API_KEY: ${{ secrets.AI_HORDE_API_KEY }}
          AI_HORDE_MAX_WAIT: "300"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEEPAI_API_KEY: ${{ secrets.DEEPAI_API_KEY }}
          MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          YT_MADE_FOR_KIDS: "false"
          YT_PRIVACY_STATUS: "public"
          YT_SCHEDULE_PUBLISH: "false"
          YT_DECLARE_SYNTHETIC_MEDIA: "true"
          YT_PLAYLIST_ENABLED: "true"
          CONTENT_SERIES: "body_glitches_fr"
          TOPIC_STRATEGY: "body_glitch_series_fr"
          REQUIRE_DAILY_TREND: "false"
          FB_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_UPLOAD_ENABLED: "false"
          TARGET_MIN_SECONDS: "40"
          TARGET_MAX_SECONDS: "55"
          CHATTERBOX_TEMPO: "0.96"
          CHATTERBOX_EXAGGERATION: "0.35"
          CHATTERBOX_CFG_WEIGHT: "0.70"
          CHATTERBOX_TEMPERATURE: "0.60"
          REQUIRE_CLONED_VOICE: "false"
          CHANNEL_LANGUAGE: "fr-FR"
          CHANNEL_COUNTRY: "FR"
          TTS_ENGINE: "kokoro"
          KOKORO_LANG_CODE: "f"
          KOKORO_VOICE: "ff_siwis"
          MUSIC_VOLUME: "0.07"
          ENABLE_SCREENSHOT_FALLBACK: "false"
          MIN_HOOK_SCORE: "85"
          QUALITY_APPROVAL_THRESHOLD: "85"
          MAX_HOOK_SECONDS: "5.0"
          FALLBACK_ABORT_RATIO: "0.80"
          VIDEO_TOPIC: ${{ inputs.topic || '' }}
          IMAGEMAGICK_BINARY: /usr/bin/convert
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt / 3 ==="
            if python src/main.py; then break
            else
              rc=$?; echo "::warning::Failed attempt $attempt code $rc"
              if [ $attempt -eq 3 ]; then exit $rc; fi; sleep $((attempt * 60))
            fi
          done

      - name: Persist durable channel state (with rebase retry)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/)" ]; then echo "No state changes."; exit 0; fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore: persist SKILLOR channel state [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then break
            else echo "Push failed retry $i"; sleep $((i*5)); if [ $i -eq 3 ]; then exit 0; fi; fi
          done

      - name: Upload video, thumbnail and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillor-run-${{ github.run_id }}
          path: |
            output/
            pipeline.log
          if-no-files-found: ignore
          retention-days: 14
