name: "Metadata Repair (one-shot)"

# Repairs titles/tags/descriptions of videos published before the content
# fixes, using data/video_history.json as ground truth. Default = DRY RUN.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = write changes to YouTube; false = dry-run preview"
        required: true
        default: false
        type: boolean
      limit:
        description: "Max videos to process (0 = all pipeline videos)"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Repair YouTube metadata
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p output
          CMD="python scripts/metadata_repair.py --limit ${{ inputs.limit }}"
          if [ "${{ inputs.apply }}" = "true" ]; then CMD="$CMD --apply"; fi
          $CMD | tee output/repair_output.log
      - name: Upload repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metadata-repair-${{ github.run_id }}
          path: |
            output/metadata_repair_report.txt
            output/repair_output.log
          if-no-files-found: ignore
