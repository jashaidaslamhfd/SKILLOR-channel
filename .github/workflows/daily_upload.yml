name: SKILLOR Daily Auto Video Generation

# Yeh workflow roz ek fixed time par chalega aur ek naya video bana kar
# output/ folder mein save kar dega (jahan se aap manually review kar sakein ge).
on:
  schedule:
    # Roz Pakistan/India time (UTC+5) shaam 6 baje -> UTC 13:00
    - cron: "0 13 * * *"
  workflow_dispatch:        # Manual run ke liye ("Run workflow" button se)
    inputs:
      topic:
        description: "Video topic (khali chhod dein to topics.txt se auto-pick hoga)"
        required: false
        default: ""

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repo checkout karein
        uses: actions/checkout@v4

      - name: Python setup karein
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: FFmpeg install karein
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto

      - name: Python dependencies install karein
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright browser install karein
        run: playwright install chromium --with-deps

      - name: .env file banayein (GitHub Secrets se)
        run: |
          mkdir -p config
          cat > config/.env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL=llama-3.3-70b-versatile
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_SECRET_FILE=config/client_secret.json
          YOUTUBE_TOKEN_FILE=config/youtube_token.json
          TIKTOK_SESSION_ID=${{ secrets.TIKTOK_SESSION_ID }}
          TTS_VOICE=ur-PK-AsadNeural
          EOF

      - name: Aaj ka topic pick karein
        id: topic
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            TOPIC="${{ github.event.inputs.topic }}"
          else
            TOPIC=$(shuf -n 1 topics.txt)
          fi
          echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
          echo "Selected topic: $TOPIC"

      - name: Video sirf generate karein (Upload = no)
        run: |
          python main.py --topic "${{ steps.topic.outputs.topic }}" --upload no

      - name: Compress output folder to ZIP (Manual review ke liye)
        if: always()
        run: |
          zip -r final_video.zip output/

      - name: Final video ko artifact ke taur par save karein
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillor-video-artifact
          path: final_video.zip
          retention-days: 2
