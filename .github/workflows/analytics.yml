name: "SKILLOR - YouTube Analytics Sync"
on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"
permissions:
  contents: write
concurrency:
  group: skillor-analytics-sync
  cancel-in-progress: false
jobs:
  sync-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "google-api-python-client>=2.100.0" "google-auth>=2.25.0" "google-auth-oauthlib>=1.1.0" "google-auth-httplib2>=0.2.0" "requests>=2.31.0" "python-dotenv>=1.0.0"
      - name: Sync real analytics into video history
        shell: bash
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          VIDEO_HISTORY_PATH: "data/video_history.json"
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python src/analytics_updater.py
      - name: Persist updated analytics state (with retry)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/)" ]; then echo "No analytics changes."; exit 0; fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore: sync YouTube analytics into history [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then break
            else echo "Retry $i"; sleep $((i*5)); if [ $i -eq 3 ]; then exit 0; fi; fi
          done
