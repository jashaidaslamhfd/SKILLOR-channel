name: "SKILLOR - YouTube Analytics Learning"

on:
  workflow_dispatch:
  schedule:
    # Daily update; videos must be at least 24h old before querying metrics.
    - cron: "20 9 * * *"

permissions:
  contents: write

concurrency:
  group: skillor-channel-state
  cancel-in-progress: false

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install analytics dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'google-api-python-client>=2.100.0' \
            'google-auth>=2.25.0' \
            'google-auth-oauthlib>=1.1.0' \
            'google-auth-httplib2>=0.2.0' \
            'numpy>=1.24.0' 'Pillow>=10.0.0'

      - name: Update real YouTube metrics
        env:
          VIDEO_HISTORY_PATH: data/video_history.json
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python src/analytics_updater.py

      - name: Persist analytics state
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "No analytics changes to persist."
            exit 0
          fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore: update SKILLOR analytics [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
