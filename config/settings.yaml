# ============================================
# SKILLOR - YouTube Automation Settings
# ============================================

# ===== CHANNEL INFORMATION =====
channel:
  name: "SKILLOR"
  language: "ur"
  audience: "Pakistan, India"
  niche: "Tech & AI Tools"
  tagline: "AI ki duniya, Urdu mein."
  youtube_handle: "@SKILLOR"
  description: "SKILLOR - AI aur Technology ki duniya Urdu mein. Rozana naye AI tools, tips aur tricks seekhein!"

# ===== VIDEO SETTINGS =====
video:
  # Resolution for YouTube Shorts (9:16)
  resolution: [1080, 1920]
  fps: 30
  duration:
    min: 40          # Minimum seconds
    max: 55          # Maximum seconds
    target: 48       # Target seconds
  
  # Caption styling for Urdu text
  caption_style:
    font: "Jameel Noori Nastaleeq"
    font_size: 64
    color: "white"
    highlight_color: "#FFD400"
    stroke_color: "black"
    stroke_width: 3
    shadow: true
    shadow_color: "black"
    position: "bottom-center"   # bottom-center, bottom-left, bottom-right
    margin_v: 120               # Vertical margin from bottom
    background_bar: true        # Add semi-transparent bar behind captions
    bar_opacity: 0.5            # 0.0 to 1.0
  
  # Intro/Outro settings
  intro:
    enabled: false
    duration: 3
    file: "assets/intro.mp4"
  
  outro:
    enabled: true
    duration: 5
    file: "assets/outro.mp4"
  
  background_music:
    enabled: false
    volume: 0.1                  # 0.0 to 1.0
    file: "assets/background.mp3"

# ===== TEXT-TO-SPEECH SETTINGS =====
tts:
  # Edge TTS voices for Urdu
  voice: "ur-PK-AsadNeural"      # Male voice
  # Alternative: "ur-PK-UzmaNeural" # Female voice
  rate: "+0%"                    # Speed: -50% to +50%
  pitch: "+0Hz"                  # Pitch: -10Hz to +10Hz
  volume: "+0%"                  # Volume: -50% to +50%
  
  # Fallback if primary voice fails
  fallback_voice: "ur-PK-UzmaNeural"

# ===== SCRIPT GENERATION =====
script:
  # Groq AI settings
  model: "llama-3.3-70b-versatile"
  temperature: 0.8
  max_tokens: 800
  
  # Script structure
  max_words: 180                 # Total words in script
  tone: "energetic, simple Urdu, thoda Roman Urdu mix, hooks ke sath"
  
  # Script sections
  hook:
    enabled: true
    max_words: 20                # Hook should be 3-5 seconds
  body:
    max_words: 140
  cta:
    enabled: true
    template: "SKILLOR ko follow karein aur AI tools k baray me roz seekhein!"
  
  # Content rules
  content_rules:
    forbidden_words: ["hate", "violence", "political", "religious"]
    min_words_per_sentence: 3
    max_words_per_sentence: 15
  
  # Tool detection
  tool_names:
    - "chatgpt.com"
    - "deepseek.com"
    - "midjourney.com"
    - "canva.com"
    - "perplexity.ai"
    - "notion.so"
    - "claude.ai"
    - "gemini.google.com"
    - "copilot.github.com"
    - "cursor.sh"

# ===== STOCK FOOTAGE SETTINGS =====
stock_footage:
  # API providers priority
  provider_priority: ["pexels", "pixabay"]
  
  # Download settings
  clips_per_video: 5
  clip_min_duration: 3           # Minimum seconds per clip
  clip_max_duration: 8           # Maximum seconds per clip
  
  # Search settings
  search_language: "en"
  orientation: "portrait"        # portrait, landscape, square
  video_quality: "high"          # high, medium, low
  
  # Fallback settings
  fallback_to_static: true       # Use static image if video not found
  fallback_color: "#1a1a2e"     # Background color for fallback
  
  # Cache settings
  cache_enabled: true
  cache_duration_days: 7

# ===== TOOL SCREENSHOT SETTINGS =====
tool_screenshot:
  enabled: true
  max_tools_per_video: 2         # Maximum tools to capture
  
  # Capture settings
  scroll_capture: true
  capture_duration_sec: 6
  scroll_speed: 300              # Pixels per scroll step
  scroll_steps_per_second: 2
  
  # Browser settings
  headless: true
  viewport: [1080, 1920]
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  
  # Timeout settings
  page_load_timeout: 30          # Seconds
  wait_after_load: 2             # Seconds
  
  # Fallback
  fallback_to_static: true
  static_duration: 5             # Seconds for static fallback
  
  # Allowed domains (only these will be captured)
  allowed_domains:
    - "chatgpt.com"
    - "deepseek.com"
    - "midjourney.com"
    - "canva.com"
    - "perplexity.ai"
    - "notion.so"
    - "claude.ai"
    - "gemini.google.com"
    - "copilot.github.com"
    - "cursor.sh"
    - "openai.com"
    - "anthropic.com"
    - "google.com"
    - "microsoft.com"
    - "adobe.com"

# ===== SEO OPTIMIZATION =====
seo:
  # Title optimization
  titles:
    max_length: 60               # YouTube recommended
    min_length: 30
    power_words: 
      - "Complete"
      - "Easy"
      - "Simple"
      - "Professional"
      - "New"
      - "Ultimate"
      - "Best"
      - "Top"
      - "Amazing"
      - "Secret"
    include_year: true
    include_numbers: true
    include_emojis: false
  
  # Description optimization
  descriptions:
    min_length: 200
    max_length: 5000
    include_timestamps: false
    include_links: true
    include_cta: true
    include_hashtags: true
    include_social_links: true
    
    # Social links
    social_links:
      instagram: "@SKILLOR"
      twitter: "@SKILLOR"
      facebook: "SKILLOR"
      youtube: "@SKILLOR"
  
  # Hashtag settings
  hashtags:
    max_count: 15
    include_channel: true
    channel_tags: ["#SKILLOR", "#UrduTech", "#AITools", "#PakistanTech"]
    
    # Category specific tags
    category_tags:
      "AI Tools": ["#ArtificialIntelligence", "#MachineLearning", "#DeepLearning", "#AI"]
      "ChatGPT": ["#ChatGPT", "#OpenAI", "#GPT4", "#PromptEngineering"]
      "Tech News": ["#TechNews", "#Innovation", "#FutureTech", "#Technology"]
      "Productivity": ["#ProductivityHacks", "#WorkSmarter", "#Efficiency"]
      "Coding": ["#Programming", "#CodingLife", "#Developer", "#SoftwareEngineering"]
      "Digital Marketing": ["#DigitalMarketing", "#SEO", "#SocialMedia"]
      "Cybersecurity": ["#CyberSecurity", "#DataProtection", "#Privacy"]
      "Data Science": ["#DataScience", "#BigData", "#Analytics"]
  
  # CTA templates (randomly selected)
  cta_templates:
    - "Channel SKILLOR ko follow karein aur AI ki duniya mein aagey badhein!"
    - "SKILLOR ke saath AI seekhein aur apne career ko boost karein!"
    - "Rozana AI tips ke liye SKILLOR ko subscribe karein!"
    - "Technology ki duniya mein SKILLOR aapka guide hai!"
    - "AI aur Tech ke secrets jaanne ke liye SKILLOR follow karein!"
    - "SKILLOR channel par naye AI tools daily, subscribe karein!"
    - "AI seekhna hai? SKILLOR hai aapka best teacher!"

# ===== THUMBNAIL GENERATION =====
thumbnail:
  enabled: true
  resolution: [1280, 720]        # YouTube recommended
  
  # Colors
  background_color: "#1a1a2e"
  accent_color: "#FFD400"
  text_color: "#FFFFFF"
  shadow_color: "#000000"
  
  # Design
  gradient: true
  gradient_colors: ["#0f0c29", "#302b63", "#24243e"]
  rounded_corners: true
  corner_radius: 20
  
  # Text settings
  title:
    max_lines: 3
    font_size: 45
    shadow: true
    shadow_offset: 3
  
  # Branding
  logo:
    enabled: true
    text: "SKILLOR"
    font_size: 50
    color: "#FFD400"
    position: "top-left"
  
  # Elements
  watch_now_button: true
  button_color: "#FFD400"
  button_text: "▶️ Watch Now"

# ===== YOUTUBE UPLOAD SETTINGS =====
upload:
  youtube:
    enabled: true
    privacy: "public"            # public, unlisted, private
    category_id: "28"            # 28 = Science & Technology
    made_for_kids: false
    
    # Schedule upload
    scheduled_upload: false
    
    # Default tags
    default_tags:
      - "SKILLOR"
      - "AI Tools"
      - "Urdu Tech"
      - "Technology"
      - "Pakistan"
      - "India"
      - "Artificial Intelligence"
      - "Machine Learning"
    
    # Upload settings
    retry_count: 3
    retry_delay_seconds: 30
    chunk_size: -1              # -1 = auto
    mimetype: "video/mp4"
  
  tiktok:
    enabled: false
    privacy: "public"
    retry_count: 3

# ===== SCHEDULER SETTINGS =====
scheduler:
  enabled: true
  videos_per_day: 3
  upload_times: ["10:00", "14:00", "18:00"]  # Pakistan Standard Time
  timezone: "Asia/Karachi"
  
  # Retry settings
  max_retries: 3
  retry_delay_minutes: 30
  retry_on_failure: true
  
  # Logging
  log_file: "skillor_automation.log"
  log_upload: true
  upload_log_file: "upload_log.txt"

# ===== AUTOMATION SETTINGS =====
automation:
  # Trending topics
  trending_topics:
    sources: 
      - "product_hunt"
      - "github_trending"
      - "hacker_news"
      - "twitter_trending"
    max_topics: 20
    refresh_interval_hours: 6
    min_trending_score: 70      # 0-100
    
    # Manual topics pool (used if API fails)
    fallback_topics:
      - "ChatGPT ka naya feature jo aap nahi jante"
      - "5 AI tools jo aapka kaam asaan kar dein"
      - "Midjourney se professional images kaise banayein"
      - "Canva AI se video editing kaise karein"
      - "AI se paisay kamane ke 3 tareeqay"
      - "Notion AI kya hai aur kaise use karein"
      - "DeepSeek vs ChatGPT - kya farq hai"
      - "AI se resume kaise banayein 2 minute mein"
      - "Free AI tools jo Pakistan mein famous ho rahe hain"
      - "Perplexity AI kya hai aur kaise kaam karta hai"
  
  # Content rotation
  content_rotation:
    categories: 
      - "AI Tools"
      - "ChatGPT"
      - "Tech News"
      - "Productivity"
      - "Coding"
      - "Digital Marketing"
    avoid_duplicates_days: 7
    prefer_categories: ["AI Tools", "ChatGPT"]

# ===== PERFORMANCE SETTINGS =====
performance:
  # Download settings
  max_concurrent_downloads: 3
  download_timeout_seconds: 30
  
  # FFmpeg settings
  ffmpeg:
    hardware_acceleration: false    # Set true for NVIDIA GPU
    encoder: "libx264"              # or "h264_nvenc" for GPU
    pixel_format: "yuv420p"
    audio_bitrate: "128k"
    video_bitrate: "2000k"
  
  # Cleanup
  cleanup:
    enabled: true
    keep_original_clips: false
    delete_temp_files: true
    keep_logs_days: 30

# ===== DEBUGGING =====
debug:
  enabled: false
  log_level: "INFO"               # DEBUG, INFO, WARNING, ERROR
  save_intermediate_files: true
  verbose_output: true
